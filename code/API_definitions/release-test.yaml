openapi: 3.0.3
info:
  title: Release Test
  description: |
    Minimal test definition for validating the CAMARA release automation workflow.
    This is not a real API — it exists solely for end-to-end testing.
  version: wip
  x-camara-commonalities: 0.6
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0.html
externalDocs:
  description: Product documentation at CAMARA
  url: https://github.com/camaraproject/TestRepo
servers:
  - url: "{apiRoot}/release-test/vwip"
    variables:
      apiRoot:
        default: https://localhost:443
        description: API root
tags:
  - name: Status
    description: Service status operations
paths:   
  /status:
    get:
      operationId: getStatus
      summary: Get service status
      description: Returns the current status of the release test service.
      tags:
        - Status
      parameters:
        - name: verbose
          in: query
          schema:
            type: boolean
      responses:
        "200":
          description: Service is running
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum:
                      - available
  /status/{id}:
    get:
      operationId: getStatusById
      summary: Get status for a specific component
      tags:
        - Status
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Component status
          content:
            application/json:
              schema:
                type: object
                properties:
                  componentName:
                    type: string
                  status:
                    type: string
